# Builds the Jekyll site and deploys it.
name: Build and Deploy

# Triggers the workflow on push for the master branch
on:
  push:
    branches: [ master ]

jobs:
  jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 setup
        uses: actions/checkout@v2


      - name: Build jekyll
        run: |
          docker run --rm \
          --volume="${{ github.workspace }}:/workspace" \
          jekyll/builder:3.8.5 \
          /bin/bash -c "gem install bundler && chmod -R 777 /workspace && jekyll build"

